services:
  # Webサーバー役
  # ブラウザからのHTTPリクエストを受ける入口
  nginx:
    image: nginx:stable-alpine
    container_name: 04-docker-web-starter-nginx-wordpress-mysql

    ports:
      # ホスト側8082番 → コンテナ内Nginxの80番
      # http://localhost:8082 で確認する
      - "8082:80"

    volumes:
      # WordPress本体をNginxコンテナに見せる
      # Nginxは読むだけなので :ro のままでOK
      - ./wordpress:/var/www/html:ro

      # 自作テーマ開発用
      # ホスト側の wp-dev/themes/V5 を
      # WordPress内の wp-content/themes/V5 として見せる
      # NginxはCSS / JS / 画像などの静的ファイルを読む
      - ./wp-dev/themes/V5:/var/www/html/wp-content/themes/V5:ro

      # Nginx設定ファイルを差し替える
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

    depends_on:
      - php

  # PHP-FPM入りのWordPressイメージを選択
  # WordPressはファイルを書き込むため、PHP側のWordPress本体volumeには :ro を付けない
  php:
    image: wordpress:php8.3-fpm
    container_name: 04-wordpress-php-fpm

    environment:
      WORDPRESS_DB_HOST: mysql:3306
      WORDPRESS_DB_NAME: starter_db
      WORDPRESS_DB_USER: starter_user
      WORDPRESS_DB_PASSWORD: starter_pass

    volumes:
      # WordPress本体
      # wp-config.php、uploads、languages などを書き込むため :ro は付けない
      - ./wordpress:/var/www/html

      # 自作テーマ開発用
      # PHP-FPMはテーマ内のPHPテンプレートを実行する
      # 編集はホスト側のVS Codeで行うため、コンテナ側は読み取り専用でOK
      - ./wp-dev/themes/V5:/var/www/html/wp-content/themes/V5:ro

    depends_on:
      mysql:
        condition: service_healthy

  # データベース役
  # WordPress PHP-FPMコンテナから mysql:3306 で接続する
  mysql:
    image: mysql:8.0
    container_name: 04-docker-web-starter-mysql

    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci

    environment:
      MYSQL_ROOT_PASSWORD: root_pass
      MYSQL_DATABASE: starter_db
      MYSQL_USER: starter_user
      MYSQL_PASSWORD: starter_pass

    volumes:
      # MySQLのデータを永続化する
      # docker compose down では残る
      # docker compose down -v で消える
      - mysql_data:/var/lib/mysql

      # 初回起動時にSQLを流し込む場所
      # 今回は基本 .gitkeep のみでOK
      - ./mysql/init:/docker-entrypoint-initdb.d:ro

    ports:
      # 学習・確認用
      # ホスト側からMySQLへ接続したい場合に使う
      - "3307:3306"

    healthcheck:
      # MySQLコンテナ自身の中で接続確認する
      # healthy になってから WordPress PHP-FPM を起動させる
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD}",
        ]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 300s

volumes:
  mysql_data:
